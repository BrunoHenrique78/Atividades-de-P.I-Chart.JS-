<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chart</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<canvas id="grafico_Temperatura"></canvas>

<script>

const Mês = [
    'Janeiro',
    'Fevereiro',
    'Março',
    'Abril',
    'Maio',
    'Junho',
];

const data = {
    labels: Mês,
    datasets: [
    {
        label: 'Temperatura Média',
        backgroundColor: 'orange',
        data: [22, 24, 27, 23, 20, 18],
    },
    {
        label: 'Umidade Média',
        backgroundColor: 'blue',
        data: [90, 89, 93, 87, 88, 82],
    }]
};

const config_grafico_Temperatura = {
    type: 'bar',
    data: data,
    options: {}
};

const myChart = new Chart(
    document.getElementById('grafico_Temperatura'),
    config_grafico_Temperatura
);

</script>

</body>
</html>
